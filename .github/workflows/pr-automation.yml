name: PR Automation Workflow
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-quality:
    name: code-quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint
        continue-on-error: true
        id: eslint
      - name: Run Prettier check
        run: npx prettier --check .
        continue-on-error: true
        id: prettier
      - name: Post Code Quality Report
        uses: actions/github-script@v7
        with:
          script: |
            const eslintStatus = "${{ steps.eslint.outcome }}";
            const prettierStatus = "${{ steps.prettier.outcome }}";
            const comment = `## Code Quality Report
            ### ESLint: ${eslintStatus === 'success' ? '✅ Passed' : '❌ Failed'}
            ### Prettier: ${prettierStatus === 'success' ? '✅ Passed' : '❌ Failed'}
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  testing-suite:
    name: testing-suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Run tests with coverage
        run: npm test -- --coverage
        id: test
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
      - name: Post Test Coverage Report
        uses: actions/github-script@v7
        with:
          script: |
            const testStatus = "${{ steps.test.outcome }}";
            const comment = `## Test Coverage Report
            ### Test Suite: ${testStatus === 'success' ? '✅ Passed' : '❌ Failed'}
            Coverage report uploaded as artifact.
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Run dependency vulnerability check
        run: npm audit --audit-level moderate
        continue-on-error: true
        id: audit
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        id: gitleaks
      - name: Post Security Scan Report
        uses: actions/github-script@v7
        with:
          script: |
            const auditStatus = "${{ steps.audit.outcome }}";
            const gitleaksStatus = "${{ steps.gitleaks.outcome }}";
            const comment = `## Security Scan Report
            ### Dependencies: ${auditStatus === 'success' ? '✅ No moderate+ vulnerabilities' : '❌ Vulnerabilities found'}
            ### Secrets Scan: ${gitleaksStatus === 'success' ? '✅ No secrets detected' : '❌ Secrets found'}
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  build-validation:
    name: build-validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Build application
        run: npm run build
        id: build
      - name: Validate endpoints (example)
        run: |
          # Example: Check if build output exists
          if [ -d "dist" ]; then echo "Build output exists"; else exit 1; fi
        continue-on-error: true
        id: endpoints
      - name: Upload deployment preview artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
      - name: Post Build Validation
        uses: actions/github-script@v7
        with:
          script: |
            const buildStatus = "${{ steps.build.outcome }}";
            const endpointsStatus = "${{ steps.endpoints.outcome }}";
            const comment = `## Build Validation
            ### Build: ${buildStatus === 'success' ? '✅ Successful' : '❌ Failed'}
            ### Endpoints Validation: ${endpointsStatus === 'success' ? '✅ Passed' : '❌ Failed'}
            Deployment preview artifacts uploaded.
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });