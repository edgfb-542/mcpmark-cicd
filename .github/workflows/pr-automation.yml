name: PR Automation Workflow

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        id: eslint
        run: |
          eslint_output=$(npm run lint 2>&1 || true)
          echo "eslint_output=$eslint_output" >> $GITHUB_OUTPUT

      - name: Run Prettier
        id: prettier
        run: |
          prettier_output=$(npx prettier --check . 2>&1 || true)
          echo "prettier_output=$prettier_output" >> $GITHUB_OUTPUT

      - name: Post Code Quality Report
        uses: actions/github-script@v7
        with:
          script: |
            const eslintOutput = `${{ steps.eslint.outputs.eslint_output }}`;
            const prettierOutput = `${{ steps.prettier.outputs.prettier_output }}`;
            const commentBody = `## Code Quality Report\n\n### ESLint Results:\n\`\`\`\n${eslintOutput}\n\`\`\`\n\n### Prettier Results:\n\`\`\`\n${prettierOutput}\n\`\`\``;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

  testing-suite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        id: tests
        run: |
          test_output=$(npm test -- --coverage 2>&1 || true)
          echo "test_output=$test_output" >> $GITHUB_OUTPUT

      - name: Post Test Coverage Report
        uses: actions/github-script@v7
        with:
          script: |
            const testOutput = `${{ steps.tests.outputs.test_output }}`;
            const commentBody = `## Test Coverage Report\n\n\`\`\`\n${testOutput}\n\`\`\``;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: warn

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run dependency vulnerability check
        id: dep-check
        run: |
          dep_output=$(npm audit --json 2>&1 || true)
          dep_summary=$(echo "$dep_output" | jq -r '.metadata.vulnerabilities // "No vulnerabilities found"' 2>&1 || echo "Failed to parse dependency check results")
          echo "dep_summary=$dep_summary" >> $GITHUB_OUTPUT

      - name: Scan for secrets
        id: secret-scan
        uses: truffleHog/trufflehog@v3
        with:
          path: .
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          output: trufflehog-results.json
        continue-on-error: true

      - name: Read secret scan results
        id: read-secret-results
        run: |
          secret_output=$(cat trufflehog-results.json 2>&1 || echo "No secrets found")
          echo "secret_output=$secret_output" >> $GITHUB_OUTPUT

      - name: Post Security Scan Report
        uses: actions/github-script@v7
        with:
          script: |
            const depSummary = `${{ steps.dep-check.outputs.dep_summary }}`;
            const secretOutput = `${{ steps.read-secret-results.outputs.secret_output }}`;
            const commentBody = `## Security Scan Report\n\n### Dependencies:\n${depSummary}\n\n### Secrets Scan:\n\`\`\`\n${secretOutput}\n\`\`\``;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

  build-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        id: build
        run: |
          build_output=$(npm run build 2>&1 || true)
          echo "build_output=$build_output" >> $GITHUB_OUTPUT

      - name: Validate endpoints
        id: validate-endpoints
        run: |
          # Start the application
          npm start &
          # Wait for the app to be ready (adjust port and endpoint as needed)
          npx wait-on http://localhost:3000/health 2>&1 || true
          # Validate the endpoint
          endpoint_output=$(curl -s http://localhost:3000/health 2>&1 || echo "Endpoint validation failed")
          echo "endpoint_output=$endpoint_output" >> $GITHUB_OUTPUT
          # Stop the application
          pkill -f "npm start" 2>&1 || true

      - name: Upload build preview artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-preview
          path: dist/
          if-no-files-found: warn

      - name: Post Build Validation
        uses: actions/github-script@v7
        with:
          script: |
            const buildOutput = `${{ steps.build.outputs.build_output }}`;
            const endpointOutput = `${{ steps.validate-endpoints.outputs.endpoint_output }}`;
            const commentBody = `## Build Validation\n\n### Build Output:\n\`\`\`\n${buildOutput}\n\`\`\`\n\n### Endpoint Validation:\n\`\`\`\n${endpointOutput}\n\`\`\``;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });
